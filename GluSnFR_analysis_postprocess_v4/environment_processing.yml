# iGluSnFR Analysis Toolbox v3 - Processing Environment
# Includes ilastik and GPU-accelerated dependencies
#
# Install with: conda env create -f environment_processing.yml
#
# GPU Requirements:
#   - NVIDIA driver >= 525 (CUDA 12.x support)
#   - For Blackwell GPUs (B100/B200): driver >= 570 recommended
#   - CuPy 12.x+ works with CUDA 12.0-12.8

name: iglusnfr_processing
channels:
  - ilastik-forge
  - conda-forge
  - defaults
dependencies:
  # Python (3.9 required by ilastik)
  - python=3.9

  # ilastik (brings in lazyflow, volumina, vigra, etc.)
  # Pin ilastik and volumina to versions compatible with Python 3.9.
  # Newer volumina (>=1.4) uses Python 3.10+ type hint syntax (PEP 604)
  # which causes "unsupported operand type(s) for |" on 3.9.
  - ilastik>=1.4.0,<1.5
  - volumina>=1.3.0,<1.4

  # Scientific computing
  - numpy>=1.23
  - pandas>=1.5
  - scipy>=1.9
  - scikit-image>=0.19
  - scikit-learn>=1.1
  - tifffile>=2022.5
  - dask>=2022.0
  - joblib>=1.2

  # GPU acceleration (CUDA 12.x)
  - cupy>=12.0
  - numba>=0.56

  # Utilities
  - matplotlib>=3.5
  - psutil>=5.9
  - tqdm>=4.64

  # pip dependencies (for packages not on conda)
  - pip
  - pip:
    - cucim
