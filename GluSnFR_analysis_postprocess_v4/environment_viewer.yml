# iGluSnFR Analysis Toolbox v3 - Viewer Environment
# For napari-based visualization and analysis
#
# Install with: conda env create -f environment_viewer.yml

name: iglusnfr_viewer
channels:
  - conda-forge
  - defaults
dependencies:
  # Python
  - python=3.10

  # napari and Qt
  - napari>=0.5
  - pyqt>=5.15
  - pyqtwebengine

  # Scientific computing
  - numpy>=1.23
  - pandas>=1.5
  - scipy>=1.9
  - scikit-image>=0.19
  - tifffile>=2022.5

  # Plotting and utilities
  - matplotlib>=3.5
  - plotly>=5.0
  - psutil>=5.9

  # High-performance CSV I/O
  - polars>=0.20
  - pyarrow>=12.0

  # pip dependencies
  - pip
  - pip:
    - napari[all]
